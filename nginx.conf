# ============================================================
# Influencer Trigger — nginx reverse proxy configuration
#
# Usage:
#   1. Build frontend: cd client && npm run build
#   2. Copy dist/ contents to /var/www/influencer-trigger/ (or adjust root below)
#   3. Include this file or copy to /etc/nginx/sites-available/influencer-trigger
#   4. nginx -t && nginx -s reload
# ============================================================

upstream influencer_backend {
    server 127.0.0.1:6002;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;   # Replace with your domain or IP

    # Redirect HTTP → HTTPS (uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    # ---- Frontend static files ----
    root /var/www/influencer-trigger;  # Path to client/dist/
    index index.html;

    # SPA fallback — all non-asset paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- API reverse proxy ----
    location /api/ {
        proxy_pass         http://influencer_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ---- WebSocket proxy ----
    location /ws {
        proxy_pass         http://influencer_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ---- Gzip compression ----
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_vary       on;

    # ---- Security headers ----
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection      "1; mode=block";
}

