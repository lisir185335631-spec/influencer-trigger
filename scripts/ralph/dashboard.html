<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ralph — 干活进度</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: hsl(240 5% 96%);
    --fg: hsl(0 0% 13%);
    --card: hsl(0 0% 100%);
    --border: hsl(0 0% 88%);
    --secondary: hsl(240 4% 91%);
    --muted: hsl(0 0% 45%);
    --mac-green: hsl(142 71% 45%);
    --mac-red: hsl(4 90% 58%);
    --mac-orange: hsl(36 100% 50%);
    --mac-blue: hsl(211 100% 50%);
    --mac-purple: hsl(280 68% 60%);
    --mac-gray: hsl(0 0% 72%);
    --mac-tint: hsl(211 100% 96%);
    --glass-bg: hsla(0, 0%, 100%, 0.72);
    --glass-border: hsla(0, 0%, 100%, 0.5);
    --glass-shadow: 0 2px 20px rgba(0,0,0,0.06), 0 0 1px rgba(0,0,0,0.1);
    --glass-shadow-lg: 0 8px 40px rgba(0,0,0,0.08), 0 0 1px rgba(0,0,0,0.12);
    --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --font-mono: 'SF Mono', Menlo, Monaco, 'Cascadia Code', Consolas, monospace;
  }

  html, body { height: 100%; font-family: var(--font-sans); color: var(--fg); -webkit-font-smoothing: antialiased; }

  body {
    background:
      radial-gradient(ellipse at 20% 50%, hsla(211,100%,95%,0.6) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, hsla(280,70%,95%,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, hsla(142,60%,95%,0.3) 0%, transparent 50%),
      var(--bg);
  }

  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(1.8);
    -webkit-backdrop-filter: blur(20px) saturate(1.8);
    border: 0.5px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
  }
  .glass-lg {
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(1.8);
    -webkit-backdrop-filter: blur(24px) saturate(1.8);
    border: 0.5px solid var(--glass-border);
    box-shadow: var(--glass-shadow-lg);
  }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .topbar {
    display: flex; align-items: center; gap: 20px;
    padding: 12px 20px; margin: 12px 16px 0; border-radius: 12px;
  }
  .topbar .title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; flex-shrink: 0; }
  .topbar .sep { width: 1px; height: 16px; background: var(--border); }
  .progress-wrap { flex: 1; display: flex; align-items: center; gap: 12px; }
  .progress-bar { flex: 1; height: 5px; background: var(--secondary); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--mac-blue); border-radius: 99px; transition: width 0.7s ease-out; }
  .progress-label { font-size: 12px; color: var(--muted); font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .topbar .meta { display: flex; gap: 12px; font-size: 11px; color: var(--muted); font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

  .main { flex: 1; display: flex; gap: 12px; padding: 12px 16px; overflow: hidden; min-height: 0; }
  .stories-panel { width: 340px; flex-shrink: 0; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
  .stories-panel .panel-title { padding: 12px 16px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); font-weight: 500; }
  .stories-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  .logs-panel { flex: 1; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
  .logs-panel .panel-title { padding: 12px 16px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); font-weight: 500; }
  .logs-content { flex: 1; overflow-y: auto; padding: 0 16px 16px; }

  .bottombar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px; margin: 0 16px 12px; border-radius: 12px;
  }
  .phase { display: flex; align-items: center; gap: 8px; }
  .phase-dot { width: 7px; height: 7px; border-radius: 50%; }
  .phase-text { font-size: 12px; color: var(--muted); }
  .clock { font-size: 11px; color: var(--muted); font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

  /* Story Card */
  .story-card {
    padding: 12px; margin-bottom: 8px; border-radius: 12px;
    transition: all 0.2s; cursor: default;
  }
  .story-card:hover { background: hsla(0,0%,100%,0.4); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .story-card.active { box-shadow: var(--glass-shadow-lg); border: 0.5px solid var(--glass-border); background: var(--glass-bg); }
  .story-card.pending { opacity: 0.5; }
  .story-card .row { display: flex; align-items: flex-start; gap: 10px; }
  .story-card .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .story-card .info { flex: 1; min-width: 0; }
  .story-card .header { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  .story-card .id { font-size: 11px; font-family: var(--font-mono); color: var(--muted); font-weight: 500; }
  .story-card .badge {
    font-size: 10px; padding: 1px 6px; border-radius: 6px; font-weight: 500;
  }
  .story-card .retry { font-size: 10px; font-family: var(--font-mono); color: var(--mac-red); }
  .story-card .card-title { font-size: 13px; line-height: 1.4; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .story-card .notes { margin-top: 4px; font-size: 11px; color: hsla(4,90%,58%,0.8); line-height: 1.4; }

  /* Log section */
  .log-section { margin-bottom: 12px; border-radius: 12px; overflow: hidden; }
  .log-header { padding: 8px 16px; font-size: 12px; font-weight: 600; border-bottom: 0.5px solid hsla(0,0%,88%,0.5); }
  .log-header.latest { color: var(--mac-blue); }
  .log-body { padding: 12px 16px; font-size: 12px; line-height: 1.7; color: var(--muted); font-family: var(--font-mono); white-space: pre-wrap; word-break: break-word; }
  .log-body strong { color: var(--fg); font-weight: 600; }

  /* Tabs (Progress / Agent Log / Screenshots) */
  .tabs {
    display: flex; gap: 2px; padding: 8px 8px 0; border-bottom: 0.5px solid hsla(0,0%,88%,0.5);
  }
  .tab {
    padding: 8px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); font-weight: 500; cursor: pointer; border-radius: 8px 8px 0 0;
    border: 0.5px solid transparent; border-bottom: none; transition: all 0.15s;
    user-select: none;
  }
  .tab:hover { color: var(--fg); background: hsla(0,0%,100%,0.4); }
  .tab.active {
    color: var(--mac-blue); background: var(--glass-bg);
    border-color: var(--glass-border); box-shadow: 0 -1px 4px rgba(0,0,0,0.02);
  }
  .tab .badge-count {
    display: inline-block; margin-left: 6px; padding: 0 6px;
    font-size: 10px; background: var(--secondary); border-radius: 8px;
    color: var(--muted); font-weight: 600;
  }
  .tab.active .badge-count { background: var(--mac-tint); color: var(--mac-blue); }

  .tab-panel { display: none; flex: 1; overflow-y: auto; padding: 0 16px 16px; }
  .tab-panel.active { display: block; }

  /* Agent Log tab */
  .agent-log-meta {
    padding: 10px 14px; margin: 12px 0; border-radius: 8px;
    background: hsla(0,0%,100%,0.5); border: 0.5px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 12px; font-size: 11px;
    font-family: var(--font-mono); color: var(--muted);
  }
  .agent-log-meta .k { color: var(--fg); font-weight: 600; }
  .agent-log-meta .v { color: var(--muted); }
  .agent-log-tail {
    margin: 8px 0; padding: 14px;
    background: hsl(220 15% 10%); color: hsl(120 40% 85%);
    border-radius: 10px; font-family: var(--font-mono); font-size: 11px;
    line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    max-height: 50vh; overflow-y: auto;
  }
  .agent-log-tail.empty {
    color: hsl(220 10% 50%); font-style: italic; text-align: center; padding: 30px;
    background: hsla(0,0%,100%,0.3);
  }
  .agent-log-prompt-toggle {
    padding: 8px 14px; margin-top: 12px;
    background: transparent; border: 0.5px solid var(--border); border-radius: 8px;
    font-size: 11px; color: var(--muted); cursor: pointer;
    font-family: var(--font-sans); transition: all 0.15s;
  }
  .agent-log-prompt-toggle:hover { background: hsla(0,0%,100%,0.5); color: var(--fg); }
  .agent-log-prompt {
    display: none; margin-top: 8px; padding: 14px;
    background: hsla(240 5% 96% / 0.6); border-radius: 10px;
    font-family: var(--font-mono); font-size: 11px; line-height: 1.6;
    color: var(--fg); white-space: pre-wrap; word-break: break-word;
    max-height: 40vh; overflow-y: auto;
    border: 0.5px solid var(--border);
  }
  .agent-log-prompt.open { display: block; }

  /* Screenshots grid */
  .shots-summary {
    padding: 10px 14px; margin: 12px 0;
    display: flex; gap: 16px; font-size: 12px; color: var(--muted);
  }
  .shots-summary .pass-count { color: var(--mac-green); font-weight: 600; }
  .shots-summary .fail-count { color: var(--mac-red); font-weight: 600; }
  .shots-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px; padding: 4px 0 20px;
  }
  .shot-card {
    position: relative; border-radius: 10px; overflow: hidden;
    background: hsla(0,0%,100%,0.6); border: 0.5px solid var(--border);
    transition: all 0.15s; cursor: pointer;
  }
  .shot-card:hover { transform: translateY(-1px); box-shadow: var(--glass-shadow); }
  .shot-card img { width: 100%; display: block; aspect-ratio: 4/3; object-fit: cover; background: var(--bg); }
  .shot-card .shot-label {
    position: absolute; top: 6px; left: 6px;
    padding: 2px 8px; border-radius: 6px;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    font-family: var(--font-mono); letter-spacing: 0.5px;
  }
  .shot-card .shot-label.pass { background: hsla(142,60%,95%,1); color: var(--mac-green); }
  .shot-card .shot-label.fail { background: hsla(4,80%,96%,1); color: var(--mac-red); }
  .shot-card .shot-meta {
    padding: 6px 10px; font-size: 10px; color: var(--muted);
    font-family: var(--font-mono); display: flex; justify-content: space-between;
  }
  .shots-empty {
    text-align: center; color: var(--muted); font-style: italic;
    padding: 40px; font-size: 12px;
  }

  /* Screenshot modal */
  .shot-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.82); z-index: 1000;
    align-items: center; justify-content: center; padding: 40px;
    cursor: zoom-out;
  }
  .shot-modal.open { display: flex; }
  .shot-modal img {
    max-width: 96vw; max-height: 92vh;
    border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    background: white;
  }
  .shot-modal .shot-modal-caption {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: white; font-family: var(--font-mono); font-size: 12px;
    padding: 6px 16px; background: rgba(0,0,0,0.5); border-radius: 8px;
  }

  /* Animations */
  @keyframes breathe {
    0%, 100% { opacity: 0.4; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  .breathe { animation: breathe 2s ease-in-out infinite; }

  @keyframes mac-pulse {
    0%, 100% { box-shadow: 0 0 0 0 hsla(211,100%,50%,0.3); }
    50% { box-shadow: 0 0 0 6px hsla(211,100%,50%,0); }
  }
  .active-pulse { animation: mac-pulse 2s ease-in-out infinite; }

  @keyframes loading-dots {
    0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; }
  }
  .loading-dots::after { content: ''; animation: loading-dots 1.5s steps(4, end) infinite; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: hsla(0,0%,0%,0.15); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: hsla(0,0%,0%,0.3); }

  @media (max-width: 800px) {
    .main { flex-direction: column; }
    .stories-panel { width: 100%; max-height: 40vh; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Top Bar -->
  <div class="topbar glass">
    <div class="title">AI coding 3.0 干活进度</div>
    <div class="sep"></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0/0</div>
    </div>
    <div class="sep"></div>
    <div class="meta">
      <span id="iterInfo">Round 0/0</span>
      <span id="elapsedInfo">0s</span>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="stories-panel glass-lg">
      <div class="panel-title">User Stories</div>
      <div class="stories-list" id="storyList"></div>
    </div>
    <div class="logs-panel glass-lg">
      <div class="tabs">
        <div class="tab active" data-tab="progress">📋 Progress Log</div>
        <div class="tab" data-tab="agent">📜 Agent Log<span class="badge-count" id="agentLogBadge">-</span></div>
        <div class="tab" data-tab="shots">📸 Screenshots<span class="badge-count" id="shotsBadge">0</span></div>
      </div>
      <div class="tab-panel active" id="panel-progress">
        <div class="logs-content" id="logContent"></div>
      </div>
      <div class="tab-panel" id="panel-agent">
        <div id="agentLogMeta" class="agent-log-meta"><span class="v">加载中...</span></div>
        <div id="agentLogTail" class="agent-log-tail empty">Agent log 尚未产生内容（Claude CLI 非流式输出，等一整回合结束才会 flush）</div>
        <button class="agent-log-prompt-toggle" id="promptToggle">▼ 查看本轮 Prompt</button>
        <div id="agentLogPrompt" class="agent-log-prompt"></div>
      </div>
      <div class="tab-panel" id="panel-shots">
        <div class="shots-summary" id="shotsSummary"><span class="v">加载中...</span></div>
        <div class="shots-grid" id="shotsGrid"></div>
      </div>
    </div>
  </div>

  <!-- Screenshot modal -->
  <div class="shot-modal" id="shotModal" onclick="closeShotModal()">
    <img id="shotModalImg" src="" alt="">
    <div class="shot-modal-caption" id="shotModalCaption"></div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottombar glass">
    <div class="phase">
      <div class="phase-dot" id="phaseDot" style="background:var(--mac-gray)"></div>
      <div class="phase-text" id="phaseText">等待启动</div>
    </div>
    <div class="clock" id="clock"></div>
  </div>
</div>

<script>
const POLL_MS = 2000;

const PHASE_MAP = {
  idle:          { label: '等待启动',              color: 'var(--mac-gray)',   animate: false },
  developing:    { label: 'Developer Agent 工作中',  color: 'var(--mac-blue)',   animate: true },
  validating:    { label: 'Validator 验证中',       color: 'var(--mac-orange)', animate: true },
  waiting_audit: { label: '等待 Opus 质量审查',     color: '#a855f7',           animate: true },
  done:          { label: '全部完成',              color: 'var(--mac-green)',  animate: false },
  error:         { label: '出现错误',              color: 'var(--mac-red)',    animate: false },
};

const STATE_CONFIG = {
  developing: { label: '开发中',   dotColor: 'var(--mac-blue)',   badgeBg: 'var(--mac-tint)',          badgeColor: 'var(--mac-blue)' },
  validating: { label: '验证中',   dotColor: 'var(--mac-orange)', badgeBg: 'hsla(36,80%,95%,1)',      badgeColor: 'var(--mac-orange)' },
  auditing:   { label: '审查中',   dotColor: 'var(--mac-purple)', badgeBg: 'hsla(280,60%,96%,1)',      badgeColor: 'var(--mac-purple)' },
  active:     { label: '进行中',   dotColor: 'var(--mac-blue)',   badgeBg: 'var(--mac-tint)',          badgeColor: 'var(--mac-blue)' },
  passed:     { label: '已通过',   dotColor: 'var(--mac-green)',  badgeBg: 'hsla(142,60%,95%,1)',      badgeColor: 'var(--mac-green)' },
  failed:     { label: '未通过',   dotColor: 'var(--mac-red)',    badgeBg: 'hsla(4,80%,96%,1)',        badgeColor: 'var(--mac-red)' },
  blocked:    { label: '已阻塞',   dotColor: 'var(--mac-orange)', badgeBg: 'hsla(36,80%,95%,1)',      badgeColor: 'var(--mac-orange)' },
  pending:    { label: '待执行',   dotColor: 'var(--mac-gray)',   badgeBg: 'transparent',              badgeColor: 'var(--muted)' },
};

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function fmtElapsed(s) {
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

let _auditGate = null;
let _runtime = null;

function getState(story, cur, runtime, auditGate) {
  if (story.blocked) return 'blocked';
  const isCurrent = story.id === cur;

  if (isCurrent) {
    // 优先看 audit-gate（权威）
    if (auditGate && auditGate.story_id === story.id) {
      if (auditGate.status === 'pending') return 'auditing';
      if (auditGate.status === 'approved') return 'passed';
    }
    // 再看 phase
    if (runtime && runtime.phase === 'developing') return 'developing';
    if (runtime && runtime.phase === 'validating') return 'validating';
    if (runtime && runtime.phase === 'waiting_audit') return 'auditing';
    return 'active';
  }

  // 非当前 story：passes=true 说明已经 approved 过（否则 Ralph 不会跳到下一个）
  if (story.passes === true) return 'passed';
  if (story.passes === false && (story.retryCount > 0 || story.notes)) return 'failed';
  return 'pending';
}

function fmtMin(sec) {
  if (sec < 60) return sec + 's';
  return Math.floor(sec/60) + 'm';
}

function renderStories(stories, cur, runtime, auditGate) {
  const el = document.getElementById('storyList');
  el.innerHTML = stories.map(s => {
    const st = getState(s, cur, runtime, auditGate);
    const cfg = STATE_CONFIG[st];
    const isRunning = ['developing', 'validating', 'auditing', 'active'].includes(st);
    const isCurrent = s.id === cur;

    // 当前 story 的实时进度（phase_elapsed / screenshots / log_bytes）
    let progressBar = '';
    if (isCurrent && runtime && isRunning) {
      const parts = [];
      if (runtime.phase_elapsed) parts.push(`⏱ ${fmtMin(runtime.phase_elapsed)}`);
      if (runtime.screenshots_count > 0) parts.push(`📸 ${runtime.screenshots_count}`);
      if (runtime.log_bytes !== undefined) parts.push(`📄 ${runtime.log_bytes}B`);
      if (parts.length) {
        progressBar = `<div class="notes" style="color:var(--muted)">${parts.join(' · ')}</div>`;
      }
    }

    return `<div class="story-card ${st} ${isRunning ? 'active-pulse' : ''}">
      <div class="row">
        <div class="dot ${isRunning ? 'breathe' : ''}" style="background:${cfg.dotColor}"></div>
        <div class="info">
          <div class="header">
            <span class="id">${s.id}</span>
            <span class="badge" style="background:${cfg.badgeBg};color:${cfg.badgeColor}">${cfg.label}</span>
            ${s.retryCount > 0 ? `<span class="retry">×${s.retryCount}</span>` : ''}
          </div>
          <div class="card-title">${esc(s.title)}</div>
          ${s.notes ? `<div class="notes">${esc(s.notes)}</div>` : ''}
          ${progressBar}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderLogs(logs) {
  const el = document.getElementById('logContent');
  if (!logs.trim()) { el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;font-style:italic">暂无日志</div>'; return; }
  const secs = logs.split(/(?=^## )/m).filter(s => s.trim());
  el.innerHTML = secs.map((sec, i) => {
    const isLatest = i === secs.length - 1;
    const lines = sec.split('\n');
    const header = lines[0].replace(/^## /, '').trim();
    const body = lines.slice(1).join('\n').trim().replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    return `<div class="log-section ${isLatest ? 'glass-lg' : 'glass'}">
      <div class="log-header ${isLatest ? 'latest' : ''}">${esc(header)}</div>
      <div class="log-body">${body}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function renderProgress(stories) {
  const passed = stories.filter(s => s.passes === true).length;
  const total = stories.length;
  document.getElementById('progressFill').style.width = (total ? Math.round(passed/total*100) : 0) + '%';
  document.getElementById('progressLabel').textContent = passed + '/' + total;
}

function renderPhase(rt) {
  const cfg = PHASE_MAP[rt.phase] || PHASE_MAP.idle;
  const dot = document.getElementById('phaseDot');
  const text = document.getElementById('phaseText');
  dot.style.background = cfg.color;
  dot.className = 'phase-dot' + (cfg.animate ? ' breathe' : '');
  let label = cfg.label;
  if (cfg.animate) {
    const storyPart = rt.current_story ? ` · ${rt.current_story}` : '';
    label += storyPart + ` · Round ${rt.iteration}`;
    // Validator 进度详情（实时显示 Validator 在干什么）
    const detail = [];
    if (rt.phase_elapsed !== undefined) detail.push(fmtMin(rt.phase_elapsed));
    if (rt.screenshots_count > 0) detail.push(`📸${rt.screenshots_count}`);
    if (rt.log_bytes !== undefined && rt.log_bytes > 0) detail.push(`📄${rt.log_bytes}B`);
    if (detail.length) label += ` · ${detail.join(' · ')}`;
    label += '<span class="loading-dots"></span>';
  }
  text.innerHTML = label;
  document.getElementById('iterInfo').textContent = `Round ${rt.iteration}/${rt.max_iterations}`;
  document.getElementById('elapsedInfo').textContent = fmtElapsed(rt.elapsed);
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN');
}

async function poll() {
  let data;
  try {
    const res = await fetch('/api/state', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch (e) {
    // 每次都重试，不 stick。展示连接失败状态（不误导用户）
    console.warn('fetch /api/state failed:', e);
    const logEl = document.getElementById('logContent');
    if (logEl) logEl.innerHTML =
      '<div style="text-align:center;color:var(--mac-red);padding:40px;font-style:italic">' +
      '⚠️ 无法连接 Dashboard API（/api/state）<br><br>' +
      '原因：' + esc(String(e.message || e)) + '<br><br>' +
      '请检查 ralph.py 是否正在运行 (PID)。' +
      '</div>';
    document.getElementById('phaseText').innerHTML = '<span style="color:var(--mac-red)">⚠️ API 断连，下一轮重试</span>';
    return;
  }
  _auditGate = data.auditGate || null;
  _runtime = data.runtime || null;
  renderStories(data.stories, data.runtime.current_story, _runtime, _auditGate);
  renderProgress(data.stories);
  renderLogs(data.logs);
  renderPhase(data.runtime);
}

setInterval(poll, POLL_MS);
poll();

// ─── Tab switching ───
let activeTab = 'progress';
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    activeTab = t.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
    document.querySelectorAll('.tab-panel').forEach(p => {
      p.classList.toggle('active', p.id === 'panel-' + activeTab);
    });
    if (activeTab === 'agent') pollAgentLog();
    if (activeTab === 'shots') pollShots();
  });
});

// ─── Agent Log tab ───
function fmtBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(1) + ' MB';
}

async function pollAgentLog() {
  try {
    const res = await fetch('/api/agent-logs/current');
    const data = await res.json();

    // meta bar
    const metaEl = document.getElementById('agentLogMeta');
    if (data.file_name) {
      metaEl.innerHTML = `
        <span><span class="k">File:</span> <span class="v">${esc(data.file_name)}</span></span>
        <span><span class="k">Size:</span> <span class="v">${fmtBytes(data.size_bytes)}</span></span>
        <span><span class="k">Modified:</span> <span class="v">${esc(data.last_modified || '-')}</span></span>
        <span><span class="k">Phase:</span> <span class="v">${esc(data.phase || '-')}</span></span>
        <span><span class="k">Iter:</span> <span class="v">${esc(String(data.iteration || '-'))}</span></span>
        <span><span class="k">Story:</span> <span class="v">${esc(data.story_id || '-')}</span></span>
      `;
    } else {
      metaEl.innerHTML = '<span class="v">暂无活跃 agent log</span>';
    }

    // tail
    const tailEl = document.getElementById('agentLogTail');
    if (data.tail_content && data.tail_content.trim()) {
      tailEl.classList.remove('empty');
      tailEl.textContent = data.tail_content;
      tailEl.scrollTop = tailEl.scrollHeight;
    } else if (data.file_name) {
      tailEl.classList.add('empty');
      tailEl.textContent = `📄 ${data.file_name} · ${fmtBytes(data.size_bytes)}\n\nAgent 正在思考/跑命令，Claude CLI 非流式输出：\n回合结束后一次性 flush 完整 log 到此文件。\n\n查看下方 Prompt 了解 Agent 当前任务。`;
    } else {
      tailEl.classList.add('empty');
      tailEl.textContent = '当前没有进行中的 Agent log（phase: ' + (data.phase || 'idle') + '）';
    }

    // prompt
    const promptEl = document.getElementById('agentLogPrompt');
    const toggleBtn = document.getElementById('promptToggle');
    if (data.prompt_preview) {
      promptEl.textContent = data.prompt_preview + (data.prompt_preview.length >= 3000 ? '\n\n[... 已截断 ...]' : '');
      toggleBtn.style.display = 'block';
      toggleBtn.textContent = (promptEl.classList.contains('open') ? '▲ 收起 ' : '▼ 查看 ') +
        '本轮 Prompt' + (data.prompt_file_name ? ` (${data.prompt_file_name})` : '');
    } else {
      toggleBtn.style.display = 'none';
      promptEl.classList.remove('open');
    }

    document.getElementById('agentLogBadge').textContent = data.file_name ? fmtBytes(data.size_bytes) : '-';
  } catch (e) {
    console.warn('pollAgentLog failed', e);
  }
}

document.getElementById('promptToggle').addEventListener('click', () => {
  const p = document.getElementById('agentLogPrompt');
  const btn = document.getElementById('promptToggle');
  p.classList.toggle('open');
  btn.textContent = btn.textContent.replace(/^[▲▼]/, p.classList.contains('open') ? '▲' : '▼')
    .replace('查看', p.classList.contains('open') ? '收起' : '查看');
});

// ─── Screenshots tab ───
async function pollShots() {
  try {
    const res = await fetch('/api/screenshots/current');
    const data = await res.json();
    const shots = data.screenshots || [];
    const summaryEl = document.getElementById('shotsSummary');
    const passCount = shots.filter(s => s.result === 'pass').length;
    const failCount = shots.filter(s => s.result === 'fail').length;

    summaryEl.innerHTML = `
      <span><span class="k">Story:</span> <span class="v">${esc(data.story_id || '-')}</span></span>
      <span>✅ <span class="pass-count">${passCount}</span> PASS</span>
      <span>❌ <span class="fail-count">${failCount}</span> FAIL</span>
      <span><span class="v">共 ${shots.length} 张</span></span>
    `;

    const gridEl = document.getElementById('shotsGrid');
    if (shots.length === 0) {
      gridEl.innerHTML = '<div class="shots-empty">当前 story 暂无 Validator 截图</div>';
    } else {
      gridEl.innerHTML = shots.map(s => `
        <div class="shot-card" onclick="openShotModal('${esc(s.url)}', '${esc(s.name)}')">
          <img src="${esc(s.url)}" alt="${esc(s.name)}" loading="lazy">
          <div class="shot-label ${s.result}">${s.result.toUpperCase()}</div>
          <div class="shot-meta">
            <span>${esc(s.name.replace(/^validator-us-\d{3}-(pass|fail)-/, '').replace('.png', ''))}</span>
            <span>${esc(s.mtime_str)}</span>
          </div>
        </div>
      `).join('');
    }
    document.getElementById('shotsBadge').textContent = shots.length;
  } catch (e) {
    console.warn('pollShots failed', e);
  }
}

function openShotModal(url, name) {
  document.getElementById('shotModalImg').src = url;
  document.getElementById('shotModalCaption').textContent = name;
  document.getElementById('shotModal').classList.add('open');
}
function closeShotModal() {
  document.getElementById('shotModal').classList.remove('open');
}

// ─── Auto-refresh when active tab ───
setInterval(() => {
  if (activeTab === 'agent') pollAgentLog();
  if (activeTab === 'shots') pollShots();
}, 3000);
